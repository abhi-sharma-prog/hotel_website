<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant Reviews</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/custom.css">
</head>
<body>
    <header class="top-navbar">
        <nav class="navbar navbar-expand-lg navbar-light bg-light">
            <div class="container">
                <a class="navbar-brand" href="index.html">
                    <img src="images/logo.png" alt="" />
                </a>
                <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbars-rs-food">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbars-rs-food">
                    <ul class="navbar-nav ml-auto">
                        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                        <li class="nav-item"><a class="nav-link" href="menu.html">Menu</a></li>
                        <li class="nav-item"><a class="nav-link" href="reservation.html">Reservation</a></li>
                        <li class="nav-item"><a class="nav-link" href="gallery.html">Gallery</a></li>
                        <li class="nav-item active"><a class="nav-link" href="reviews.html">Reviews</a></li>
                        <li class="nav-item"><a class="nav-link" href="policies.html">Policies</a></li>
                        <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <div class="all-page-title page-breadcrumb">
        <div class="container text-center">
            <h1>Reviews</h1>
        </div>
    </div>

    <div class="contact-box">
        <div class="container">
            <div class="heading-title text-center">
                <h2>Write a Review</h2>
                <p>Rate your dining experience and help others.</p>
            </div>
            <form id="reviewForm">
                <div class="row">
                    <div class="col-md-6">
                        <input class="form-control" id="review-name" placeholder="Your Name" required>
                    </div>
                    <div class="col-md-6">
                        <input type="email" class="form-control" id="review-email" placeholder="Your Email" required>
                    </div>
                    <div class="col-md-12 mt-3">
                        <select class="custom-select d-block form-control" id="review-rating" required>
                            <option disabled selected>Choose Rating</option>
                            <option value="5">5 - Excellent</option>
                            <option value="4">4 - Very Good</option>
                            <option value="3">3 - Good</option>
                            <option value="2">2 - Fair</option>
                            <option value="1">1 - Poor</option>
                        </select>
                    </div>
                    <div class="col-md-12 mt-3">
                        <textarea class="form-control" id="review-feedback" rows="4" placeholder="Write your review" required></textarea>
                    </div>
                    <div class="col-md-12 mt-3 text-center">
                        <button class="btn btn-common" type="submit">Save Review</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <div class="gallery-box">
        <div class="container">
            <div class="heading-title text-center">
                <h2>Latest Reviews</h2>
            </div>
            <div id="review-list" class="row"></div>
        </div>
    </div>

    <script src="js/jquery-3.2.1.min.js"></script>
    <script src="js/popper.min.js"></script>
    <script src="js/bootstrap.min.js"></script>
    <script src="js/custom.js"></script>
    <script>
        const reviewList = document.getElementById("review-list");
        const reviewForm = document.getElementById("reviewForm");

        const renderReviews = (reviews) => {
            reviewList.innerHTML = "";
            if (!reviews.length) {
                reviewList.innerHTML = '<div class="col-12 text-center"><p>No reviews yet.</p></div>';
                return;
            }

            reviews.forEach((review) => {
                const col = document.createElement("div");
                col.className = "col-lg-4 col-md-6 col-12 mb-4";
                col.innerHTML = `
                    <div class="blog-box-inner" style="height:100%;">
                        <div class="blog-detail">
                            <h4>${review.name}</h4>
                            <ul><li><span>Rating: ${review.rating}/5</span></li></ul>
                            <p>${review.feedback}</p>
                        </div>
                    </div>
                `;
                reviewList.appendChild(col);
            });
        };

        const parseJsonResponse = async (res) => {
            const text = await res.text();
            let data = {};
            try {
                data = text ? JSON.parse(text) : {};
            } catch (_err) {
                throw new Error("Invalid server response");
            }

            if (!res.ok) {
                throw new Error(data.error || data.message || "Request failed");
            }

            return data;
        };

        const fetchReviews = () => {
            fetch("/api/feedback")
                .then(parseJsonResponse)
                .then((data) => renderReviews(Array.isArray(data) ? data : []))
                .catch((err) => {
                    reviewList.innerHTML = `<div class="col-12 text-center"><p>${err.message || "Unable to load reviews."}</p></div>`;
                });
        };

        reviewForm.addEventListener("submit", (e) => {
            e.preventDefault();

            const payload = {
                name: document.getElementById("review-name").value.trim(),
                email: document.getElementById("review-email").value.trim(),
                rating: document.getElementById("review-rating").value,
                feedback: document.getElementById("review-feedback").value.trim()
            };

            fetch("/api/feedback", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            })
            .then(parseJsonResponse)
            .then(() => {
                alert("Review saved successfully");
                reviewForm.reset();
                fetchReviews();
            })
            .catch((err) => alert(err.message || "Unable to save review"));
        });

        fetchReviews();
    </script>
</body>
</html>
