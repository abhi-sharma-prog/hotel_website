<script>
const blogList = document.getElementById('blog-list');
const blogForm = document.getElementById('blogForm');

const parseJsonResponse = async (res) => {
    const text = await res.text();
    let data = {};
    try {
        data = text ? JSON.parse(text) : {};
    } catch (_err) {
        throw new Error('Invalid server response');
    }
    if (!res.ok) {
        throw new Error(data.error || data.message || 'Request failed');
    }
    return data;
};

function renderPosts(posts) {
    blogList.innerHTML = '';
    if (!posts.length) {
        blogList.innerHTML = '<div class="col-12 text-center"><p>No blog posts yet.</p></div>';
        return;
    }

    posts.forEach((post) => {
        const img = post.image_url || 'images/blog-img-01.jpg';
        const date = new Date(post.created_at).toLocaleDateString();
        const col = document.createElement('div');
        col.className = 'col-lg-4 col-md-6 col-12';
        col.innerHTML = `
            <div class="blog-box-inner">
                <div class="blog-img-box"><img class="img-fluid" src="${img}" alt="Blog Image"></div>
                <div class="blog-detail">
                    <h4>${post.title}</h4>
                    <ul><li><span>Post by ${post.author}</span></li><li>|</li><li><span>${date}</span></li></ul>
                    <p>${post.content}</p>
                </div>
            </div>
        `;
        blogList.appendChild(col);
    });
}

function loadPosts() {
    fetch('/api/blogs')
        .then(parseJsonResponse)
        .then((posts) => renderPosts(Array.isArray(posts) ? posts : []))
        .catch(() => {
            blogList.innerHTML = '<div class="col-12 text-center"><p>Unable to load posts.</p></div>';
        });
}

blogForm.addEventListener('submit', (e) => {
    e.preventDefault();

    const payload = {
        title: document.getElementById('blog-title').value.trim(),
        author: document.getElementById('blog-author').value.trim(),
        imageUrl: document.getElementById('blog-image').value.trim(),
        content: document.getElementById('blog-content').value.trim()
    };

    fetch('/api/blogs', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
    })
    .then(parseJsonResponse)
    .then(() => {
        alert('Blog post saved successfully');
        blogForm.reset();
        loadPosts();
    })
    .catch((err) => {
        alert(err.message || 'Server Error');
    });
});

loadPosts();
</script>
